<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Blog Admin</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-blog"></i>
                    <h1>Blog Admin</h1>
                </div>
                <p>Sign in to your account</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username or Email
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <i class="fas fa-spinner fa-spin loading-spinner" style="display: none;"></i>
                </button>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="#" onclick="showRegisterForm()">Create one</a></p>
                <a href="/" class="back-to-site">
                    <i class="fas fa-arrow-left"></i>
                    Back to Website
                </a>
            </div>
        </div>

        <!-- Register Form (Hidden by default) -->
        <div class="register-card" id="registerCard" style="display: none;">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>Create Account</h1>
                </div>
                <p>Register new admin account</p>
            </div>

            <form id="registerForm" class="login-form">
                <div class="form-group">
                    <label for="regUsername">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="regUsername" name="username" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="regEmail" name="email" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="regPassword" name="password" required minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="login-btn" id="registerBtn">
                    <span class="btn-text">Create Account</span>
                    <i class="fas fa-spinner fa-spin loading-spinner" style="display: none;"></i>
                </button>

                <div id="registerErrorMessage" class="error-message" style="display: none;"></div>
            </form>

            <div class="login-footer">
                <p>Already have an account? <a href="#" onclick="showLoginForm()">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
